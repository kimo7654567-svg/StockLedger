<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>StockLedger</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <h1>STOCK LEDGER</h1>
      <div class="subtitle">個人股票資產追蹤</div>
    </div>
    <div class="header-right">
      <div class="rate-display">USD <span id="usdRate">--</span></div>
      <button class="eye-btn" id="eyeBtn" onclick="toggleEye()" title="隱藏金額">👁</button>
      <div class="version-badge">v1.10</div>
    </div>
  </div>

  <!-- Status -->
  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">初始化中...</span>
  </div>

  <!-- Summary cards -->
  <div class="summary-grid">
    <div class="card">
      <div class="card-label">總資產（台幣）</div>
      <div class="card-value neutral" id="totalAsset">--</div>
      <div class="card-sub">所有帳戶合計</div>
    </div>
    <div class="card">
      <div class="card-label">總投入成本</div>
      <div class="card-value neutral" id="totalCost">--</div>
      <div class="card-sub">現持倉成本</div>
    </div>
    <div class="card">
      <div class="card-label">未實現損益</div>
      <div class="card-value neutral" id="unrealizedPnl">--</div>
      <div class="card-sub" id="unrealizedPct">--</div>
    </div>
    <div class="card realized">
      <div class="card-label">已實現損益</div>
      <div class="card-value neutral" id="realizedPnl">--</div>
      <div class="card-sub" id="realizedSub">--</div>
    </div>
    <div class="card cash-card" style="grid-column:span 2;">
      <div class="card-label">現金（台幣）</div>
      <div class="card-value neutral" id="cashValue">--</div>
      <button class="card-edit-btn" onclick="toggleCashEdit()">✎ 修改</button>
      <div class="cash-input-row" id="cashEditRow" style="display:none;">
        <input type="number" id="cashInput" placeholder="輸入現金金額" step="1000">
        <button onclick="saveCash()">儲存</button>
      </div>
    </div>
  </div>

  <!-- Chart carousel -->
  <div class="chart-section">
    <div class="chart-carousel-wrap" id="chartCarouselWrap">
      <div class="chart-carousel" id="chartCarousel">
        <!-- 走勢圖 -->
        <div class="chart-slide">
          <div class="chart-slide-title">▸ 總資產歷史走勢（台幣）</div>
          <div class="chart-empty" id="chartEmpty">資料累積中，每次開啟自動記錄節點</div>
          <canvas id="assetChart" style="display:none"></canvas>
        </div>
        <!-- 圓餅圖 -->
        <div class="chart-slide">
          <div class="chart-slide-title">▸ 資產配置</div>
          <div class="chart-empty" id="pieEmpty" style="display:none">尚無持倉資料</div>
          <canvas id="allocationChart" style="display:none"></canvas>
        </div>
      </div>
    </div>
    <div class="chart-dots">
      <div class="chart-dot active" onclick="goToSlide(0)"></div>
      <div class="chart-dot" onclick="goToSlide(1)"></div>
    </div>
  </div>

  <!-- Holdings -->
  <div>
    <div class="tabs-bar">
      <div class="tabs">
        <div class="tab active" onclick="switchTab('active')">持倉中</div>
        <div class="tab" onclick="switchTab('closed')">已平倉</div>
        <div class="tab" onclick="switchTab('transactions')">交易紀錄</div>
      </div>
      <button class="btn" onclick="toggleAddForm()">＋ 新增</button>
    </div>

    <div class="add-form" id="addForm">
      <div class="form-grid">
        <div class="form-group">
          <label>股票代碼</label>
          <input type="text" id="f_symbol" placeholder="2330 / 00662" style="text-transform:uppercase;">
        </div>
        <div class="form-group">
          <label>市場</label>
          <select id="f_currency">
            <option value="TWD">台股上市（.TW）</option>
            <option value="TWO">台股上櫃（.TWO）</option>
            <option value="USD">美股（USD）</option>
          </select>
        </div>
        <div class="form-group">
          <label>帳戶</label>
          <input type="text" id="f_account" placeholder="永豐 / 富邦 / IB" list="accountList">
          <datalist id="accountList"></datalist>
        </div>
        <div class="form-group">
          <label>買入日期</label>
          <input type="date" id="f_date">
        </div>
        <div class="form-group">
          <label>買入價格（每股）</label>
          <input type="number" id="f_price" placeholder="0.00" step="0.01">
        </div>
        <div class="form-group">
          <label>股數</label>
          <input type="number" id="f_shares" placeholder="0" step="0.001">
        </div>
        <div class="form-group">
          <label>備註（選填）</label>
          <input type="text" id="f_note" placeholder="備註">
        </div>
      </div>
      <div class="form-actions">
        <button class="btn" onclick="addHolding()">確認新增</button>
        <button class="btn btn-danger" onclick="toggleAddForm()">取消</button>
      </div>
    </div>

    <div id="holdingsContainer"></div>
  </div>

  <!-- Debug -->
  <div class="debug-section" style="margin-top:16px;">
    <div class="debug-toggle" onclick="toggleDebug()"><span id="debugArrow">▶</span> DEBUG LOG</div>
    <div class="debug-panel" id="debugPanel"></div>
  </div>

  <div class="footer-link">
    <span onclick="showSetup()">⚙ 修改連線設定</span>
  </div>
</div>

<!-- 賣出 Modal -->
<div class="modal-overlay" id="sellModal">
  <div class="modal">
    <h2>平倉確認</h2>
    <div class="modal-sub" id="sellModalSub">填入賣出資訊</div>
    <div class="mform-group"><label>賣出日期</label><input type="date" id="sell_date"></div>
    <div class="mform-group"><label>賣出價格（每股）</label><input type="number" id="sell_price" placeholder="0.00" step="0.01"></div>
    <div class="modal-actions">
      <button class="btn btn-warn" onclick="confirmSell()">確認平倉</button>
      <button class="btn btn-danger" onclick="closeSellModal()">取消</button>
    </div>
  </div>
</div>

<!-- 手動股價 Modal -->
<div class="modal-overlay" id="priceModal">
  <div class="modal">
    <h2>無法取得股價</h2>
    <div class="modal-sub" id="priceModalSub">請手動輸入當前股價</div>
    <div class="mform-group"><label>當前股價</label><input type="number" id="manual_price" placeholder="0.00" step="0.01"></div>
    <div class="modal-actions">
      <button class="btn" onclick="confirmManualPrice()">確認</button>
    </div>
  </div>
</div>

<!-- Setup -->
<div class="setup-overlay" id="setupOverlay">
  <div class="setup-box">
    <div style="font-family:var(--mono);font-size:13px;color:var(--accent);letter-spacing:2px;margin-bottom:4px;">STOCK LEDGER</div>
    <div style="font-family:var(--mono);font-size:10px;color:var(--text-dim);margin-bottom:20px;">請輸入存取 Token</div>
    <div class="mform-group" style="margin-bottom:20px;">
      <label>TOKEN</label>
      <input id="setup_token" type="password" placeholder="你設定的 secret token">
    </div>
    <button onclick="saveSetup()" style="width:100%;font-family:var(--mono);font-size:12px;padding:11px;border-radius:4px;border:1px solid var(--accent);background:var(--accent);color:var(--bg);cursor:pointer;letter-spacing:1px;font-weight:700;">確認連線</button>
    <div style="font-family:var(--mono);font-size:10px;color:var(--text-muted);margin-top:10px;text-align:center;">Token 存在本機瀏覽器，換裝置需重新輸入</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="app.js"></script>
</body>
</html>
