<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>StockLedger</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0e1a;
  --surface: #111827;
  --surface2: #1a2235;
  --border: #1e2d45;
  --accent: #00e5ff;
  --green: #00e676;
  --red: #ff4444;
  --yellow: #ffd600;
  --text: #e2e8f0;
  --text-dim: #64748b;
  --text-muted: #334155;
  --mono: 'Space Mono', monospace;
  --sans: 'Noto Sans TC', sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
body { background:var(--bg); color:var(--text); font-family:var(--sans); min-height:100vh; overflow-x:hidden; }
body::before {
  content:''; position:fixed; inset:0;
  background-image: linear-gradient(rgba(0,229,255,0.02) 1px,transparent 1px), linear-gradient(90deg,rgba(0,229,255,0.02) 1px,transparent 1px);
  background-size:40px 40px; pointer-events:none; z-index:0;
}
.container { max-width:800px; margin:0 auto; padding:16px; position:relative; z-index:1; }

/* Header */
.header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; padding-bottom:14px; border-bottom:1px solid var(--border); }
.header-left h1 { font-family:var(--mono); font-size:16px; color:var(--accent); letter-spacing:3px; }
.header-left .subtitle { font-size:10px; color:var(--text-dim); margin-top:3px; font-family:var(--mono); }
.header-right { display:flex; align-items:center; gap:10px; }
.version-badge { font-family:var(--mono); font-size:10px; color:var(--text-muted); border:1px solid var(--border); padding:2px 6px; border-radius:3px; }
.rate-display { font-family:var(--mono); font-size:11px; color:var(--text-dim); }
.rate-display span { color:var(--accent); font-weight:700; }
.eye-btn { background:none; border:1px solid var(--border); border-radius:4px; padding:4px 8px; cursor:pointer; font-size:14px; color:var(--text-dim); transition:all 0.15s; }
.eye-btn:hover { border-color:var(--accent); color:var(--accent); }

/* Status */
.status-bar { display:flex; align-items:center; gap:8px; margin-bottom:16px; font-family:var(--mono); font-size:10px; color:var(--text-dim); }
.status-dot { width:6px; height:6px; border-radius:50%; background:var(--text-muted); flex-shrink:0; }
.status-dot.loading { background:#ff6b35; animation:pulse 1s infinite; }
.status-dot.ok { background:var(--green); }
.status-dot.error { background:var(--red); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* Summary cards */
.summary-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:16px; }
.card { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:12px 14px; position:relative; overflow:hidden; }
.card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,var(--accent),transparent); }
.card.realized::before { background:linear-gradient(90deg,var(--yellow),transparent); }
.card-label { font-size:9px; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; font-family:var(--mono); }
.card-value { font-family:var(--mono); font-size:15px; font-weight:700; }
.card-value.positive { color:var(--green); }
.card-value.negative { color:var(--red); }
.card-value.neutral { color:var(--text); }
.card-sub { font-size:10px; color:var(--text-dim); margin-top:3px; font-family:var(--mono); }

/* Chart */
.section { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:16px; margin-bottom:16px; }
.section-title { font-family:var(--mono); font-size:10px; color:var(--text-dim); text-transform:uppercase; letter-spacing:2px; margin-bottom:12px; }
canvas { width:100% !important; height:160px !important; }
.chart-empty { height:160px; display:flex; align-items:center; justify-content:center; color:var(--text-muted); font-size:11px; font-family:var(--mono); border:1px dashed var(--border); border-radius:6px; text-align:center; padding:16px; }

/* Tabs */
.tabs-bar { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.tabs { display:flex; gap:2px; }
.tab { font-family:var(--mono); font-size:10px; color:var(--text-dim); padding:5px 10px; cursor:pointer; letter-spacing:1px; border-bottom:2px solid transparent; transition:all 0.15s; text-transform:uppercase; }
.tab.active { color:var(--accent); border-bottom-color:var(--accent); }

/* Buttons */
.btn { font-family:var(--mono); font-size:10px; padding:6px 10px; border-radius:4px; border:1px solid var(--accent); background:transparent; color:var(--accent); cursor:pointer; letter-spacing:1px; transition:all 0.15s; white-space:nowrap; }
.btn:hover { background:var(--accent); color:var(--bg); }
.btn:active { opacity:0.8; }
.btn-danger { border-color:var(--red); color:var(--red); }
.btn-danger:hover { background:var(--red); color:white; }
.btn-warn { border-color:var(--yellow); color:var(--yellow); }
.btn-warn:hover { background:var(--yellow); color:var(--bg); }
.btn-sm { padding:4px 8px; font-size:10px; }

/* Account row */
.account-row {
  background:var(--surface); border:1px solid var(--border); border-radius:8px;
  margin-bottom:8px; overflow:hidden;
}
.account-header {
  display:flex; align-items:center; gap:10px;
  padding:12px 14px; cursor:pointer; user-select:none;
  border-left:3px solid var(--accent);
  transition: background 0.1s;
}
.account-header:active { background:var(--surface2); }
.account-chevron { font-size:10px; color:var(--text-muted); transition:transform 0.2s; margin-right:2px; }
.account-chevron.open { transform:rotate(90deg); }
.account-name { font-family:var(--mono); font-size:12px; font-weight:700; flex:1; }
.account-meta { display:flex; flex-direction:column; align-items:flex-end; gap:2px; }
.account-asset { font-family:var(--mono); font-size:11px; color:var(--text); }
.account-cost { font-family:var(--mono); font-size:10px; color:var(--text-dim); }
.account-pnl { font-family:var(--mono); font-size:12px; font-weight:700; }
.account-body { display:none; border-top:1px solid var(--border); }
.account-body.open { display:block; }

/* Stock row */
.stock-item { border-bottom:1px solid var(--border); }
.stock-item:last-child { border-bottom:none; }
.stock-header {
  display:flex; align-items:center; gap:10px;
  padding:11px 14px; cursor:pointer; user-select:none;
  transition: background 0.1s;
}
.stock-header:active { background:var(--surface2); }
.stock-chevron { font-size:9px; color:var(--text-muted); transition:transform 0.2s; }
.stock-chevron.open { transform:rotate(90deg); }
.stock-symbol { font-family:var(--mono); font-size:13px; font-weight:700; color:var(--accent); flex:1; }
.stock-currency-badge { font-family:var(--mono); font-size:9px; color:var(--text-muted); background:var(--surface2); padding:1px 5px; border-radius:3px; }
.closed-badge { font-size:9px; background:var(--text-muted); color:var(--bg); padding:1px 5px; border-radius:2px; }
.stock-price { font-family:var(--mono); font-size:12px; color:var(--text); min-width:80px; text-align:right; }
.stock-pnl { font-family:var(--mono); font-size:12px; font-weight:700; min-width:70px; text-align:right; }

/* Stock detail */
.stock-detail { display:none; padding:12px 14px 14px; background:var(--surface2); border-top:1px solid var(--border); }
.stock-detail.open { display:block; }
.detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:12px; }
.detail-item label { display:block; font-family:var(--mono); font-size:9px; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px; margin-bottom:3px; }
.detail-item .val { font-family:var(--mono); font-size:12px; color:var(--text); }
.detail-item .val.positive { color:var(--green); }
.detail-item .val.negative { color:var(--red); }
.detail-actions { display:flex; gap:8px; margin-top:4px; }

/* Add form */
.add-form { display:none; background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:16px; margin-bottom:16px; }
.add-form.visible { display:block; }
.form-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:12px; }
.form-group label { display:block; font-family:var(--mono); font-size:9px; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px; margin-bottom:4px; }
.form-group input, .form-group select { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:4px; padding:8px 10px; color:var(--text); font-family:var(--mono); font-size:12px; outline:none; }
.form-group input:focus, .form-group select:focus { border-color:var(--accent); }
.form-group select option { background:var(--surface); }
.form-actions { display:flex; gap:8px; flex-wrap:wrap; }

/* Transactions */
.tx-item { padding:11px 14px; border-bottom:1px solid var(--border); }
.tx-item:last-child { border-bottom:none; }
.tx-top { display:flex; align-items:center; gap:8px; margin-bottom:4px; }
.tx-symbol { font-family:var(--mono); font-size:13px; font-weight:700; color:var(--accent); }
.tx-acct { font-family:var(--mono); font-size:10px; color:var(--text-dim); }
.tx-date { font-family:var(--mono); font-size:10px; color:var(--text-muted); margin-left:auto; }
.tx-bottom { display:flex; gap:12px; font-family:var(--mono); font-size:11px; color:var(--text-dim); }
.tx-pnl { font-weight:700; }

/* Debug */
.debug-section { margin-bottom:16px; }
.debug-toggle { font-family:var(--mono); font-size:10px; color:var(--text-muted); cursor:pointer; display:flex; align-items:center; gap:6px; user-select:none; }
.debug-panel { display:none; background:#060a10; border:1px solid var(--border); border-radius:6px; padding:12px; margin-top:8px; max-height:200px; overflow-y:auto; }
.debug-panel.visible { display:block; }
.debug-line { font-family:var(--mono); font-size:10px; padding:2px 0; border-bottom:1px solid var(--border); display:flex; gap:8px; }
.debug-line:last-child { border-bottom:none; }
.debug-time { color:var(--text-muted); min-width:70px; flex-shrink:0; }
.debug-tag { min-width:90px; flex-shrink:0; }
.debug-tag.ok { color:var(--green); }
.debug-tag.err { color:var(--red); }
.debug-tag.info { color:var(--accent); }
.debug-tag.warn { color:var(--yellow); }
.debug-msg { color:var(--text-dim); word-break:break-all; }

/* Modal */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(10,14,26,0.92); z-index:200; align-items:flex-end; justify-content:center; }
.modal-overlay.visible { display:flex; }
.modal { background:var(--surface); border:1px solid var(--border); border-radius:12px 12px 0 0; padding:24px; width:100%; max-width:500px; }
.modal h2 { font-family:var(--mono); font-size:12px; color:var(--accent); letter-spacing:2px; margin-bottom:4px; }
.modal .modal-sub { font-family:var(--mono); font-size:11px; color:var(--text-dim); margin-bottom:20px; }
.mform-group { margin-bottom:14px; }
.mform-group label { display:block; font-family:var(--mono); font-size:9px; color:var(--text-dim); letter-spacing:1px; margin-bottom:4px; text-transform:uppercase; }
.mform-group input { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:4px; padding:10px 12px; color:var(--text); font-family:var(--mono); font-size:12px; outline:none; }
.mform-group input:focus { border-color:var(--accent); }
.modal-actions { display:flex; gap:8px; margin-top:16px; }

/* Setup */
.setup-overlay { display:none; position:fixed; inset:0; background:rgba(10,14,26,0.97); z-index:300; align-items:center; justify-content:center; padding:16px; }
.setup-overlay.visible { display:flex; }
.setup-box { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:28px; width:100%; max-width:400px; }

.empty-state { text-align:center; padding:28px; color:var(--text-muted); font-family:var(--mono); font-size:11px; }
.footer-link { text-align:center; padding:8px 0 20px; }
.footer-link span { font-family:var(--mono); font-size:10px; color:var(--text-muted); cursor:pointer; letter-spacing:1px; }
.footer-link span:hover { color:var(--text-dim); }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="header-left">
      <h1>STOCK LEDGER</h1>
      <div class="subtitle">個人股票資產追蹤</div>
    </div>
    <div class="header-right">
      <div class="rate-display">USD <span id="usdRate">--</span></div>
      <button class="eye-btn" id="eyeBtn" onclick="toggleEye()" title="隱藏金額">👁</button>
      <div class="version-badge">v1.09</div>
    </div>
  </div>

  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">初始化中...</span>
  </div>

  <!-- Summary cards -->
  <div class="summary-grid">
    <div class="card">
      <div class="card-label">總資產（台幣）</div>
      <div class="card-value neutral" id="totalAsset">--</div>
      <div class="card-sub">所有帳戶合計</div>
    </div>
    <div class="card">
      <div class="card-label">總投入成本</div>
      <div class="card-value neutral" id="totalCost">--</div>
      <div class="card-sub">現持倉成本</div>
    </div>
    <div class="card">
      <div class="card-label">未實現損益</div>
      <div class="card-value neutral" id="unrealizedPnl">--</div>
      <div class="card-sub" id="unrealizedPct">--</div>
    </div>
    <div class="card realized">
      <div class="card-label">已實現損益</div>
      <div class="card-value neutral" id="realizedPnl">--</div>
      <div class="card-sub" id="realizedSub">--</div>
    </div>
  </div>

  <!-- Chart -->
  <div class="section">
    <div class="section-title">▸ 總資產歷史走勢（台幣）</div>
    <div class="chart-empty" id="chartEmpty">資料累積中，每次開啟自動記錄節點</div>
    <canvas id="assetChart" style="display:none"></canvas>
  </div>

  <!-- Holdings -->
  <div>
    <div class="tabs-bar">
      <div class="tabs">
        <div class="tab active" onclick="switchTab('active')">持倉中</div>
        <div class="tab" onclick="switchTab('closed')">已平倉</div>
        <div class="tab" onclick="switchTab('transactions')">交易紀錄</div>
      </div>
      <button class="btn" onclick="toggleAddForm()">＋ 新增</button>
    </div>

    <div class="add-form" id="addForm">
      <div class="form-grid">
        <div class="form-group">
          <label>股票代碼</label>
          <input type="text" id="f_symbol" placeholder="2330 / 00662" style="text-transform:uppercase;">
        </div>
        <div class="form-group">
          <label>市場</label>
          <select id="f_currency">
            <option value="TWD">台股上市（.TW）</option>
            <option value="TWO">台股上櫃（.TWO）</option>
            <option value="USD">美股（USD）</option>
          </select>
        </div>
        <div class="form-group">
          <label>帳戶</label>
          <input type="text" id="f_account" placeholder="永豐 / 富邦 / IB" list="accountList">
          <datalist id="accountList"></datalist>
        </div>
        <div class="form-group">
          <label>買入日期</label>
          <input type="date" id="f_date">
        </div>
        <div class="form-group">
          <label>買入價格（每股）</label>
          <input type="number" id="f_price" placeholder="0.00" step="0.01">
        </div>
        <div class="form-group">
          <label>股數</label>
          <input type="number" id="f_shares" placeholder="0" step="0.001">
        </div>
        <div class="form-group">
          <label>備註（選填）</label>
          <input type="text" id="f_note" placeholder="備註">
        </div>
      </div>
      <div class="form-actions">
        <button class="btn" onclick="addHolding()">確認新增</button>
        <button class="btn btn-danger" onclick="toggleAddForm()">取消</button>
      </div>
    </div>

    <div id="holdingsContainer"></div>
  </div>

  <!-- Debug -->
  <div class="debug-section" style="margin-top:16px;">
    <div class="debug-toggle" onclick="toggleDebug()"><span id="debugArrow">▶</span> DEBUG LOG</div>
    <div class="debug-panel" id="debugPanel"></div>
  </div>

  <div class="footer-link">
    <span onclick="showSetup()">⚙ 修改連線設定</span>
  </div>
</div>

<!-- 賣出 Modal -->
<div class="modal-overlay" id="sellModal">
  <div class="modal">
    <h2>平倉確認</h2>
    <div class="modal-sub" id="sellModalSub">填入賣出資訊</div>
    <div class="mform-group"><label>賣出日期</label><input type="date" id="sell_date"></div>
    <div class="mform-group"><label>賣出價格（每股）</label><input type="number" id="sell_price" placeholder="0.00" step="0.01"></div>
    <div class="modal-actions">
      <button class="btn btn-warn" onclick="confirmSell()">確認平倉</button>
      <button class="btn btn-danger" onclick="closeSellModal()">取消</button>
    </div>
  </div>
</div>

<!-- 手動股價 Modal -->
<div class="modal-overlay" id="priceModal">
  <div class="modal">
    <h2>無法取得股價</h2>
    <div class="modal-sub" id="priceModalSub">請手動輸入當前股價</div>
    <div class="mform-group"><label>當前股價</label><input type="number" id="manual_price" placeholder="0.00" step="0.01"></div>
    <div class="modal-actions">
      <button class="btn" onclick="confirmManualPrice()">確認</button>
    </div>
  </div>
</div>

<!-- Setup -->
<div class="setup-overlay" id="setupOverlay">
  <div class="setup-box">
    <div style="font-family:var(--mono);font-size:13px;color:var(--accent);letter-spacing:2px;margin-bottom:4px;">STOCK LEDGER</div>
    <div style="font-family:var(--mono);font-size:10px;color:var(--text-dim);margin-bottom:20px;">請輸入存取 Token</div>
    <div class="mform-group" style="margin-bottom:20px;">
      <label>TOKEN</label>
      <input id="setup_token" type="password" placeholder="你設定的 secret token">
    </div>
    <button onclick="saveSetup()" style="width:100%;font-family:var(--mono);font-size:12px;padding:11px;border-radius:4px;border:1px solid var(--accent);background:var(--accent);color:var(--bg);cursor:pointer;letter-spacing:1px;font-weight:700;">確認連線</button>
    <div style="font-family:var(--mono);font-size:10px;color:var(--text-muted);margin-top:10px;text-align:center;">Token 存在本機瀏覽器，換裝置需重新輸入</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbxu3gi22-UbEG1zZYJ2JQ3vWuRy6w7xVZvcpUzwlU7Jqs6x3gj4doW37RqmgpzN_b_loA/exec';
let TOKEN = localStorage.getItem('sl_token') || '';

let holdings = [], transactions = [], snapshots = [];
let prices = {}, lastPrices = {}, lastPricesWithDate = {};
let usdRate = null, chartInstance = null, currentTab = 'active';
let pendingSell = null, manualPriceResolve = null, isLoading = false;
let eyeOpen = true; // true = 顯示金額, false = 隱藏
// 帳戶展開狀態
let accountOpen = {};
// 股票展開狀態
let stockOpen = {};

// ── 眼睛開關 ────────────────────────────────────────
function toggleEye() {
  eyeOpen = !eyeOpen;
  document.getElementById('eyeBtn').textContent = eyeOpen ? '👁' : '🙈';
  renderSummary();
  renderHoldingsContainer();
}

function maskAmt(val, forceShow) {
  if (eyeOpen || forceShow) return val;
  return '****';
}

// ── Debug ──────────────────────────────────────────
function log(tag, msg, level='info') {
  const p = document.getElementById('debugPanel');
  const t = new Date().toTimeString().slice(0,8);
  const d = document.createElement('div');
  d.className = 'debug-line';
  d.innerHTML = `<span class="debug-time">${t}</span><span class="debug-tag ${level}">[${tag}]</span><span class="debug-msg">${String(msg)}</span>`;
  p.appendChild(d); p.scrollTop = p.scrollHeight;
}
function toggleDebug() {
  const p = document.getElementById('debugPanel'), a = document.getElementById('debugArrow');
  p.classList.toggle('visible'); a.textContent = p.classList.contains('visible') ? '▼' : '▶';
}

// ── Status ─────────────────────────────────────────
function setStatus(state, msg) {
  document.getElementById('statusDot').className = 'status-dot ' + state;
  document.getElementById('statusText').textContent = msg;
}

// ── API ─────────────────────────────────────────────
async function apiCall(params) {
  const url = new URL(API_URL);
  url.searchParams.set('token', TOKEN);
  for (const [k,v] of Object.entries(params)) url.searchParams.set(k, v);
  log('API', `→ ${params.action}`);
  try {
    const res = await fetch(url.toString());
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    log('API', `← ${params.action} OK`, 'ok');
    return data;
  } catch(e) {
    log('API', `← ${params.action} FAIL: ${e.message}`, 'err');
    throw e;
  }
}

// ── 股價抓取 ────────────────────────────────────────
async function fetchAllPrices(holdingsList) {
  const today = new Date().toISOString().slice(0,10);
  const symbolMap = {};
  const needFetch = [];

  for (const h of holdingsList) {
    let ticker;
    if (h.currency === 'TWD') ticker = h.symbol + '.TW';
    else if (h.currency === 'TWO') ticker = h.symbol + '.TWO';
    else ticker = h.symbol;
    if (!symbolMap[ticker]) symbolMap[ticker] = { symbol: h.symbol, currency: h.currency };
  }

  for (const [ticker, meta] of Object.entries(symbolMap)) {
    const sym = meta.symbol;
    const cached = lastPricesWithDate[sym];
    if (cached && cached.date === today) {
      prices[sym] = cached.price;
      log('PRICE', `${ticker} 今日快取 ${cached.price}`, 'info');
    } else {
      needFetch.push(ticker);
    }
  }

  if (!needFetch.length) { log('PRICE', '所有今日快取，略過'); return; }

  log('PRICE', `批次抓取: ${needFetch.join(', ')}`);
  try {
    const res = await apiCall({ action: 'getPrices', symbols: needFetch.join(',') });
    const data = res.data || {};
    for (const [ticker, result] of Object.entries(data)) {
      const sym = symbolMap[ticker]?.symbol;
      if (!sym) continue;
      if (result.price) {
        prices[sym] = result.price;
        log('PRICE', `${ticker} = ${result.price}`, 'ok');
      } else {
        log('PRICE', `${ticker} 失敗: ${result.error}`, 'warn');
        if (lastPrices[sym]) { prices[sym] = lastPrices[sym]; log('PRICE', `${ticker} 用舊快取`, 'warn'); }
        else {
          const manual = await askManualPrice(sym, symbolMap[ticker].currency);
          prices[sym] = (manual && manual > 0) ? manual : null;
          if (prices[sym]) { try { await apiCall({action:'setLastPrice',symbol:sym,price:prices[sym]}); } catch(_){} }
        }
      }
    }
  } catch(e) {
    log('PRICE', `批次失敗: ${e.message}`, 'err');
    for (const [ticker, meta] of Object.entries(symbolMap)) {
      const sym = meta.symbol;
      if (prices[sym] !== undefined) continue;
      if (lastPrices[sym]) { prices[sym] = lastPrices[sym]; }
      else { const manual = await askManualPrice(sym, meta.currency); prices[sym] = (manual && manual > 0) ? manual : null; }
    }
  }
}

async function fetchUSDRate() {
  log('FX', '抓取 USD/TWD');
  try {
    const res = await apiCall({ action: 'getUSDRate' });
    if (res.rate) { log('FX', `USD/TWD = ${res.rate}`, 'ok'); return res.rate; }
    throw new Error(res.error || '無回傳');
  } catch(e) { log('FX', `失敗，使用預設值 32.5`, 'warn'); return 32.5; }
}

// ── 手動股價 Modal ──────────────────────────────────
function askManualPrice(symbol, currency) {
  return new Promise(resolve => {
    manualPriceResolve = resolve;
    const ccy = currency === 'USD' ? '$' : 'NT$';
    document.getElementById('priceModalSub').textContent = `${symbol} 無法自動取得，請輸入當前股價（${ccy}）`;
    document.getElementById('manual_price').value = '';
    document.getElementById('priceModal').classList.add('visible');
    setTimeout(() => document.getElementById('manual_price').focus(), 100);
  });
}
function confirmManualPrice() {
  const val = parseFloat(document.getElementById('manual_price').value);
  document.getElementById('priceModal').classList.remove('visible');
  if (manualPriceResolve) { manualPriceResolve(isNaN(val) ? null : val); manualPriceResolve = null; }
}

// ── 計算工具 ────────────────────────────────────────
function calcYears(d) { return (Date.now() - new Date(d)) / (1000*60*60*24*365.25); }
function calcCAGR(cost, val, yrs) { return (yrs < 0.01 || cost <= 0) ? null : (Math.pow(val/cost,1/yrs)-1)*100; }
function fmt(n, d=0) { if (n==null||isNaN(n)) return '--'; return n.toLocaleString('zh-TW',{minimumFractionDigits:d,maximumFractionDigits:d}); }
function fmtPct(n) { if (n==null||isNaN(n)) return '--'; return (n>=0?'+':'')+n.toFixed(2)+'%'; }
function cls(n) { return n==null?'':n>=0?'positive':'negative'; }
function toTWD(amount, currency) { return currency==='USD' ? amount*(usdRate||32.5) : amount; }
function ccySymbol(currency) { return currency==='USD' ? '$' : 'NT$'; }

// ── Tabs ────────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((el,i) => el.classList.toggle('active', ['active','closed','transactions'][i]===tab));
  renderHoldingsContainer();
}

// ── 帳戶顏色 ────────────────────────────────────────
const ACCOUNT_COLORS = ['#00e5ff','#00e676','#ffd600','#ff6b35','#c084fc','#f472b6','#38bdf8'];
const accountColorMap = {};
let colorIdx = 0;
function getAccountColor(account) {
  const key = account || '未分類';
  if (!accountColorMap[key]) { accountColorMap[key] = ACCOUNT_COLORS[colorIdx % ACCOUNT_COLORS.length]; colorIdx++; }
  return accountColorMap[key];
}

// ── 主渲染 ───────────────────────────────────────────
function renderHoldingsContainer() {
  const container = document.getElementById('holdingsContainer');
  if (currentTab === 'transactions') { renderTransactions(container); return; }

  const isClosed = currentTab === 'closed';
  const filtered = holdings.filter(h => {
    const sold = h.sell_date && String(h.sell_date).trim() !== '';
    return isClosed ? sold : !sold;
  });

  if (!filtered.length) {
    container.innerHTML = `<div class="empty-state">${isClosed?'尚無平倉紀錄':'尚無持倉，點擊右上角新增'}</div>`;
    return;
  }

  // 依帳戶分組
  const accountGroups = {};
  for (const h of filtered) {
    const acct = String(h.account||'').trim() || '未分類';
    if (!accountGroups[acct]) accountGroups[acct] = [];
    accountGroups[acct].push(h);
  }

  let html = '';
  for (const [account, items] of Object.entries(accountGroups)) {
    const color = getAccountColor(account);
    const isAcctOpen = accountOpen[account] !== false; // 預設展開

    // 依 symbol 分組
    const symbolGroups = {};
    for (const h of items) {
      if (!symbolGroups[h.symbol]) symbolGroups[h.symbol] = [];
      symbolGroups[h.symbol].push(h);
    }

    // 計算帳戶總計
    let acctAsset = 0, acctCost = 0;
    for (const [sym, sItems] of Object.entries(symbolGroups)) {
      const cur = sItems[0].currency;
      const p = prices[sym];
      const shares = sItems.reduce((s,i)=>s+parseFloat(i.shares||0),0);
      const cost = sItems.reduce((s,i)=>s+parseFloat(i.buy_price||0)*parseFloat(i.shares||0),0);
      acctCost += toTWD(cost, cur);
      if (p!=null) acctAsset += toTWD(p*shares, cur);
    }
    const acctPnl = acctAsset - acctCost;
    const acctPnlPct = acctCost > 0 ? (acctPnl/acctCost)*100 : 0;

    // 股票列
    let stockRows = '';
    for (const [symbol, sItems] of Object.entries(symbolGroups)) {
      const cur = sItems[0].currency;
      const ccy = ccySymbol(cur);
      const p = prices[symbol];
      const totalShares = sItems.reduce((s,i)=>s+parseFloat(i.shares||0),0);
      const totalCost = sItems.reduce((s,i)=>s+parseFloat(i.buy_price||0)*parseFloat(i.shares||0),0);
      const avgPrice = totalCost / totalShares;
      const currentValue = p != null ? p * totalShares : null;
      const unrealizedPnl = currentValue != null ? currentValue - totalCost : null;
      const unrealizedPct = unrealizedPnl != null ? (unrealizedPnl/totalCost)*100 : null;
      const earliestDate = sItems.reduce((d,i)=>String(i.buy_date)<d?String(i.buy_date):d, String(sItems[0].buy_date));
      const years = calcYears(earliestDate);
      const costTWD = toTWD(totalCost, cur);
      const valueTWD = currentValue!=null ? toTWD(currentValue, cur) : null;
      const cagr = valueTWD!=null ? calcCAGR(costTWD, valueTWD, years) : null;
      const sold = sItems[0].sell_date && String(sItems[0].sell_date).trim()!=='';
      const ids = sItems.map(i=>i.id).join(',');
      const stockKey = `${account}__${symbol}`;
      const isStockOpen = stockOpen[stockKey] === true;
      const curLabel = cur==='TWO'?'TWD(櫃)':cur;

      stockRows += `
        <div class="stock-item">
          <div class="stock-header" onclick="toggleStock('${stockKey}')">
            <span class="stock-chevron ${isStockOpen?'open':''}">▶</span>
            <span class="stock-symbol">${symbol}</span>
            <span class="stock-currency-badge">${curLabel}</span>
            ${sold?'<span class="closed-badge">平倉</span>':''}
            <span class="stock-price">${p!=null?ccy+fmt(p,2):'--'}</span>
            <span class="stock-pnl ${cls(unrealizedPct)}">${fmtPct(unrealizedPct)}</span>
          </div>
          <div class="stock-detail ${isStockOpen?'open':''}" id="detail-${stockKey.replace(/[^a-zA-Z0-9]/g,'_')}">
            <div class="detail-grid">
              <div class="detail-item">
                <label>持股股數</label>
                <div class="val">${maskAmt(fmt(totalShares,2)+' 股')}</div>
              </div>
              <div class="detail-item">
                <label>平均買入價</label>
                <div class="val">${maskAmt(ccy+fmt(avgPrice,2))}</div>
              </div>
              <div class="detail-item">
                <label>投入成本</label>
                <div class="val">${maskAmt(ccy+fmt(totalCost,2))}</div>
              </div>
              <div class="detail-item">
                <label>目前現值</label>
                <div class="val">${currentValue!=null?maskAmt(ccy+fmt(currentValue,2)):'--'}</div>
              </div>
              <div class="detail-item">
                <label>未實現損益</label>
                <div class="val ${cls(unrealizedPnl)}">${unrealizedPnl!=null?maskAmt((unrealizedPnl>=0?'+':'')+ccy+fmt(Math.abs(unrealizedPnl),2)):'--'}</div>
              </div>
              <div class="detail-item">
                <label>年化報酬(CAGR)</label>
                <div class="val ${cls(cagr)}">${fmtPct(cagr)}</div>
              </div>
              <div class="detail-item">
                <label>最早買入日</label>
                <div class="val" style="font-size:11px;">${earliestDate}</div>
              </div>
              <div class="detail-item">
                <label>帳戶</label>
                <div class="val" style="color:${color};font-size:11px;">${account}</div>
              </div>
            </div>
            <div class="detail-actions">
              ${!sold?`<button class="btn btn-warn btn-sm" onclick="openSellModal('${symbol}','${ids}','${cur}')">平倉</button>`:''}
              <button class="btn btn-danger btn-sm" onclick="confirmDelete('${ids}','${symbol}')">刪除</button>
            </div>
          </div>
        </div>`;
    }

    html += `
      <div class="account-row">
        <div class="account-header" style="border-left-color:${color}" onclick="toggleAccount('${account}')">
          <span class="account-chevron ${isAcctOpen?'open':''}">▶</span>
          <span class="account-name" style="color:${color}">${account}</span>
          <div class="account-meta">
            <span class="account-asset">${maskAmt('NT$'+fmt(acctAsset))}</span>
            <span class="account-cost">成本 ${maskAmt('NT$'+fmt(acctCost))}</span>
          </div>
          <span class="account-pnl ${cls(acctPnl)}">${fmtPct(acctPnlPct)}</span>
        </div>
        <div class="account-body ${isAcctOpen?'open':''}" id="acct-${account.replace(/[^a-zA-Z0-9]/g,'_')}">
          ${stockRows}
        </div>
      </div>`;
  }

  container.innerHTML = html;
}

function toggleAccount(account) {
  accountOpen[account] = accountOpen[account] === false ? true : false;
  renderHoldingsContainer();
}

function toggleStock(key) {
  stockOpen[key] = !stockOpen[key];
  renderHoldingsContainer();
}

function renderTransactions(container) {
  if (!transactions.length) { container.innerHTML = '<div class="empty-state">尚無交易紀錄</div>'; return; }
  let html = '<div class="section" style="padding:0;">';
  html += transactions.map(tx => {
    const ccy = ccySymbol(tx.currency);
    const cost = parseFloat(tx.buy_price)*parseFloat(tx.shares);
    const proceeds = parseFloat(tx.sell_price)*parseFloat(tx.shares);
    const pnl = proceeds - cost;
    const pnlPct = (pnl/cost)*100;
    const acct = String(tx.account||'').trim() || '未分類';
    const color = getAccountColor(acct);
    return `<div class="tx-item">
      <div class="tx-top">
        <span class="tx-symbol">${tx.symbol}</span>
        <span class="tx-acct" style="color:${color}">${acct}</span>
        <span class="tx-date">${tx.sell_date||'--'}</span>
      </div>
      <div class="tx-bottom">
        <span>${maskAmt(fmt(parseFloat(tx.shares),2)+'股')}</span>
        <span>買${ccy}${fmt(parseFloat(tx.buy_price),2)}</span>
        <span>賣${ccy}${fmt(parseFloat(tx.sell_price),2)}</span>
        <span class="tx-pnl ${cls(pnl)}">${maskAmt((pnl>=0?'+':'')+ccy+fmt(Math.abs(pnl),2))}</span>
        <span class="${cls(pnlPct)}">${fmtPct(pnlPct)}</span>
      </div>
    </div>`;
  }).join('');
  html += '</div>';
  container.innerHTML = html;
}

// ── Summary ─────────────────────────────────────────
function renderSummary() {
  let totalAsset=0, totalCost=0;
  const active = holdings.filter(h=>!h.sell_date||String(h.sell_date).trim()==='');
  const groups = {};
  for (const h of active) { if (!groups[h.symbol]) groups[h.symbol]=[]; groups[h.symbol].push(h); }
  for (const [sym, items] of Object.entries(groups)) {
    const cur = items[0].currency;
    const p = prices[sym];
    const shares = items.reduce((s,i)=>s+parseFloat(i.shares||0),0);
    const cost = items.reduce((s,i)=>s+parseFloat(i.buy_price||0)*parseFloat(i.shares||0),0);
    totalCost += toTWD(cost, cur);
    if (p!=null) totalAsset += toTWD(p*shares, cur);
  }
  const unrealized = totalAsset - totalCost;
  const unrealizedPct = totalCost>0?(unrealized/totalCost)*100:0;
  let realized = 0;
  for (const tx of transactions) {
    const pnl = (parseFloat(tx.sell_price)-parseFloat(tx.buy_price))*parseFloat(tx.shares);
    realized += toTWD(pnl, tx.currency);
  }

  const setCard = (id, val, n) => { const el=document.getElementById(id); el.textContent=val; el.className='card-value '+(n==null?'neutral':n>=0?'positive':'negative'); };
  setCard('totalAsset', maskAmt(`NT$${fmt(totalAsset)}`), null);
  setCard('totalCost', maskAmt(`NT$${fmt(totalCost)}`), null);
  setCard('unrealizedPnl', maskAmt(`NT$${fmt(unrealized)}`), unrealized);
  document.getElementById('unrealizedPct').textContent = fmtPct(unrealizedPct);
  setCard('realizedPnl', maskAmt(`NT$${fmt(realized)}`), realized);
  document.getElementById('realizedSub').textContent = `${transactions.length} 筆交易`;
  return totalAsset;
}

// ── Chart ────────────────────────────────────────────
function renderChart() {
  const canvas = document.getElementById('assetChart');
  const empty = document.getElementById('chartEmpty');
  if (!snapshots.length) { canvas.style.display='none'; empty.style.display='flex'; return; }
  empty.style.display='none'; canvas.style.display='block';
  const labels = snapshots.map(s=>String(s.date));
  const values = snapshots.map(s=>parseFloat(s.total_twd));
  if (chartInstance) chartInstance.destroy();
  chartInstance = new Chart(canvas, {
    type:'line',
    data:{ labels, datasets:[{ data:values, borderColor:'#00e5ff', backgroundColor:'rgba(0,229,255,0.06)', borderWidth:2, pointRadius:3, pointBackgroundColor:'#00e5ff', pointBorderColor:'#0a0e1a', pointBorderWidth:2, fill:true, tension:0.3 }] },
    options:{ responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false}, tooltip:{ backgroundColor:'#111827', borderColor:'#1e2d45', borderWidth:1, titleColor:'#64748b', bodyColor:'#e2e8f0', titleFont:{family:'Space Mono',size:10}, bodyFont:{family:'Space Mono',size:11}, callbacks:{label:ctx=>`NT$ ${fmt(ctx.parsed.y)}`} } },
      scales:{ x:{grid:{color:'rgba(30,45,69,0.5)'},ticks:{color:'#64748b',font:{family:'Space Mono',size:9}}}, y:{grid:{color:'rgba(30,45,69,0.5)'},ticks:{color:'#64748b',font:{family:'Space Mono',size:9},callback:v=>'NT$'+fmt(v)}} }
    }
  });
}

// ── 帳戶 autocomplete ────────────────────────────────
function updateAccountList() {
  const accounts = [...new Set(holdings.map(h=>String(h.account||'').trim()).filter(Boolean))];
  document.getElementById('accountList').innerHTML = accounts.map(a=>`<option value="${a}">`).join('');
}

// ── 新增持股 ────────────────────────────────────────
function toggleAddForm() {
  const f = document.getElementById('addForm');
  f.classList.toggle('visible');
  if (f.classList.contains('visible')) { document.getElementById('f_date').value = new Date().toISOString().slice(0,10); updateAccountList(); }
}

async function addHolding() {
  const symbol = document.getElementById('f_symbol').value.trim().toUpperCase();
  const currency = document.getElementById('f_currency').value;
  const account = document.getElementById('f_account').value.trim();
  const buy_date = document.getElementById('f_date').value;
  const buy_price = document.getElementById('f_price').value;
  const shares = document.getElementById('f_shares').value;
  const note = document.getElementById('f_note').value;
  if (!symbol||!buy_date||!buy_price||!shares||!account) { alert('請填寫代碼、帳戶、日期、買入價格和股數'); return; }
  setStatus('loading','新增持股中...');
  try {
    await apiCall({action:'addHolding',symbol,currency,account,buy_date,buy_price,shares,note});
    toggleAddForm();
    ['f_symbol','f_price','f_shares','f_note','f_account'].forEach(id=>document.getElementById(id).value='');
    await loadAndRender();
  } catch(e) { setStatus('error','新增失敗: '+e.message); }
}

// ── 刪除 ────────────────────────────────────────────
async function confirmDelete(ids, symbol) {
  if (!confirm(`確定要刪除 ${symbol}？此操作不可復原。`)) return;
  setStatus('loading','刪除中...');
  try { await apiCall({action:'deleteHolding',ids}); await loadAndRender(); }
  catch(e) { setStatus('error','刪除失敗: '+e.message); }
}

// ── 賣出 ────────────────────────────────────────────
function openSellModal(symbol, ids, currency) {
  pendingSell = {symbol, ids, currency};
  document.getElementById('sellModalSub').textContent = `${symbol} — 填入賣出資訊`;
  document.getElementById('sell_date').value = new Date().toISOString().slice(0,10);
  document.getElementById('sell_price').value = prices[symbol] ? prices[symbol] : '';
  document.getElementById('sellModal').classList.add('visible');
}
function closeSellModal() { document.getElementById('sellModal').classList.remove('visible'); pendingSell=null; }
async function confirmSell() {
  if (!pendingSell) return;
  const sell_date = document.getElementById('sell_date').value;
  const sell_price = document.getElementById('sell_price').value;
  if (!sell_date||!sell_price) { alert('請填寫賣出日期和價格'); return; }
  closeSellModal(); setStatus('loading','平倉中...');
  try { await apiCall({action:'sellHolding',symbol:pendingSell.symbol,ids:pendingSell.ids,sell_date,sell_price}); await loadAndRender(); }
  catch(e) { setStatus('error','平倉失敗: '+e.message); }
}

// ── Setup ────────────────────────────────────────────
function showSetup() { document.getElementById('setupOverlay').classList.add('visible'); document.getElementById('setup_token').value=TOKEN; }
function saveSetup() {
  const token = document.getElementById('setup_token').value.trim();
  if (!token) { alert('請填寫 Token'); return; }
  localStorage.setItem('sl_token',token); TOKEN=token;
  document.getElementById('setupOverlay').classList.remove('visible');
  log('SETUP','設定已儲存','ok'); loadAndRender();
}

// ── 主流程 ──────────────────────────────────────────
async function loadAndRender() {
  if (isLoading) { log('SYS','已在載入中，略過','warn'); return; }
  isLoading = true;
  setStatus('loading','載入資料中...');

  try {
    const [hRes, txRes, snapRes, lpRes] = await Promise.all([
      apiCall({action:'getHoldings'}),
      apiCall({action:'getTransactions'}),
      apiCall({action:'getSnapshots'}),
      apiCall({action:'getLastPrices'}),
    ]);
    holdings = hRes.data||[];
    transactions = txRes.data||[];
    snapshots = snapRes.data||[];
    lastPrices = {}; lastPricesWithDate = {};
    (lpRes.data||[]).forEach(r=>{
      lastPrices[r.symbol] = parseFloat(r.price);
      const d = r.updated_at ? String(r.updated_at).slice(0,10) : '';
      lastPricesWithDate[r.symbol] = { price: parseFloat(r.price), date: d };
    });
    log('DATA',`持倉 ${holdings.length}，快取 ${Object.keys(lastPrices).length}`,'ok');
  } catch(e) {
    setStatus('error','Google Sheet 連線失敗');
    document.getElementById('holdingsContainer').innerHTML='<div class="empty-state">無法連線到 Google Sheet，請確認 Token 設定</div>';
    isLoading = false; return;
  }

  // 第一階段：快取渲染
  prices = {};
  for (const [sym,p] of Object.entries(lastPrices)) prices[sym] = p;
  if (!usdRate) usdRate = 32.5;
  setStatus('loading','顯示快取，背景更新中...');
  renderSummary();
  renderHoldingsContainer();
  renderChart();

  // 第二階段：抓新資料
  usdRate = await fetchUSDRate();
  document.getElementById('usdRate').textContent = usdRate ? usdRate.toFixed(2) : '--';

  setStatus('loading','更新股價中...');
  const active = holdings.filter(h=>!h.sell_date||String(h.sell_date).trim()==='');
  await fetchAllPrices(active);

  for (const [sym,price] of Object.entries(prices)) {
    if (price!=null) { try { await apiCall({action:'setLastPrice',symbol:sym,price}); } catch(_){} }
  }

  const totalAsset = renderSummary();
  renderHoldingsContainer();
  renderChart();

  if (totalAsset > 0) {
    const today = new Date().toISOString().slice(0,10);
    try {
      const r = await apiCall({action:'addSnapshot',date:today,total_twd:totalAsset.toFixed(0),usd_rate:(usdRate||32.5).toFixed(2)});
      if (!r.skipped) {
        log('SNAPSHOT',`NT$${fmt(totalAsset)} 已記錄`,'ok');
        const s2 = await apiCall({action:'getSnapshots'});
        snapshots = s2.data||[]; renderChart();
      } else { log('SNAPSHOT','今日已記錄','info'); }
    } catch(e) { log('SNAPSHOT',`失敗: ${e.message}`,'err'); }
  }

  isLoading = false;
  setStatus('ok',`最後更新：${new Date().toLocaleString('zh-TW')}`);
}

if (!TOKEN) { showSetup(); } else { loadAndRender(); }
</script>
